<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joshua’s Fort Worth Run Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    #routeMap { height: 520px; width: 100%; }
    .live-dot {
      animation: pulse-ring 2.2s infinite ease-in-out;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.95); }
      70% { box-shadow: 0 0 0 50px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold flex items-center gap-3"><span class="text-green-500">🏃‍♂️</span> Joshua’s Fort Worth Run Tracker</h1>
        <p class="text-gray-400">Live GPS + Manual Path Drawing • Save & reload any route</p>
      </div>
      <button onclick="toggleDark()" class="p-3 bg-gray-800 rounded-xl"><i id="theme-icon" class="fas fa-moon text-xl"></i></button>
    </div>

    <!-- Map -->
    <div class="bg-gray-900 rounded-3xl p-4 mb-6">
      <div id="mapStatus" class="text-sm font-medium text-yellow-400 mb-3 text-center">Tap Enable Live GPS or start drawing manually</div>
      <div id="routeMap" class="rounded-3xl overflow-hidden shadow-2xl"></div>
    </div>

    <!-- Controls -->
    <div class="flex flex-wrap gap-3 mb-8">
      <button onclick="enableLiveGPS()" id="enableBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-lg">📍 Enable Live GPS</button>
      <button onclick="startRecording()" id="recordBtn" class="flex-1 bg-green-500 hover:bg-green-600 py-4 rounded-2xl font-bold text-lg hidden">▶️ Start Live Recording</button>
      <button onclick="toggleManualDraw()" id="manualBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold text-lg">✍️ Manual Draw Mode</button>
      <button onclick="pauseRecording()" id="pauseBtn" class="flex-1 bg-yellow-500 hover:bg-yellow-600 py-4 rounded-2xl font-bold text-lg hidden">⏸️ Pause</button>
      <button onclick="stopRecording()" id="stopBtn" class="flex-1 bg-red-500 hover:bg-red-600 py-4 rounded-2xl font-bold text-lg hidden">⏹️ Finish & Save</button>
      <button onclick="saveCurrentPath()" id="saveBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold text-lg hidden">💾 Save Current Path</button>
      <button onclick="clearLine()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-4 rounded-2xl font-bold text-lg">Clear Line</button>
      <button onclick="centerOnMe()" class="flex-1 bg-purple-600 hover:bg-purple-500 py-4 rounded-2xl font-bold text-lg">Center on Me</button>
    </div>

    <!-- Follow + Distance -->
    <div class="flex items-center justify-between bg-gray-900 rounded-3xl p-6 mb-8">
      <label class="flex items-center gap-3 text-lg font-medium">
        <input type="checkbox" id="followToggle" onchange="toggleFollow()" checked class="w-6 h-6 accent-green-500">
        Follow Me
      </label>
      <span id="liveDistance" class="text-4xl font-bold text-green-400">0.0 mi</span>
    </div>

    <!-- Saved Routes -->
    <div class="bg-gray-900 rounded-3xl p-8">
      <h4 class="font-semibold text-xl mb-5">Saved Routes (Manual or Live)</h4>
      <div id="savedRoutesList" class="space-y-3"></div>
    </div>

    <!-- Footer -->
    <div class="text-center text-gray-500 text-sm mt-12">
      Built for Joshua in Fort Worth • Tap to draw manual paths • Add to home screen!<br>
      <button onclick="exportLog()" class="underline mt-2">Export all saved routes</button>
    </div>
  </div>

  <script>
    let map = null;
    let locationMarker = null;
    let recordingPolyline = null;
    let recordingPoints = [];
    let isRecording = false;
    let isManualDraw = false;
    let isPaused = false;
    let followMe = true;
    let watchId = null;
    let savedRoutes = JSON.parse(localStorage.getItem('savedRoutes') || '[]');

    function initMap() {
      if (map) { map.invalidateSize(); return; }
      map = L.map('routeMap').setView([32.7688, -97.3093], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);

      map.on('click', e => {
        if (isManualDraw || (isRecording && !isPaused)) {
          recordingPoints.push(e.latlng);
          redrawRecordingLine();
          updateLiveDistance();
          showSaveButton();
        }
      });
    }

    function enableLiveGPS() {
      document.getElementById('enableBtn').classList.add('hidden');
      document.getElementById('recordBtn').classList.remove('hidden');
      document.getElementById('mapStatus').textContent = "Requesting location...";
      if (watchId) return;
      watchId = navigator.geolocation.watchPosition(
        pos => {
          const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
          if (!locationMarker) {
            locationMarker = L.circleMarker(latlng, {radius: 11, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 1, weight: 5, className: 'live-dot'}).addTo(map);
          } else {
            locationMarker.setLatLng(latlng);
          }
          if (followMe && map) map.flyTo(latlng, map.getZoom(), {animate: true});
          if (isRecording && !isPaused) {
            recordingPoints.push(latlng);
            redrawRecordingLine();
            updateLiveDistance();
            showSaveButton();
          }
          document.getElementById('mapStatus').textContent = "✅ Live GPS active • Big pulsing dot on";
        },
        err => alert("GPS error: " + err.message + "\n\nAllow location in browser settings."),
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    function startRecording() {
      isRecording = true;
      isManualDraw = false;
      isPaused = false;
      recordingPoints = [];
      if (recordingPolyline) recordingPolyline.remove();
      document.getElementById('recordBtn').classList.add('hidden');
      document.getElementById('pauseBtn').classList.remove('hidden');
      document.getElementById('stopBtn').classList.remove('hidden');
      document.getElementById('manualBtn').classList.add('hidden');
      document.getElementById('mapStatus').textContent = "Live recording active — move to draw green path";
    }

    function toggleManualDraw() {
      isManualDraw = !isManualDraw;
      isRecording = false;
      document.getElementById('manualBtn').innerHTML = isManualDraw ? '✍️ Exit Manual Draw' : '✍️ Manual Draw Mode';
      document.getElementById('mapStatus').textContent = isManualDraw ? "Manual draw active — tap the map to build your path" : "Ready — tap buttons above";
      if (!isManualDraw) showSaveButton();
    }

    function pauseRecording() {
      isPaused = !isPaused;
      document.getElementById('pauseBtn').innerHTML = isPaused ? '▶️ Resume' : '⏸️ Pause';
      document.getElementById('mapStatus').textContent = isPaused ? "Paused" : "Recording resumed";
    }

    function stopRecording() {
      isRecording = false;
      document.getElementById('pauseBtn').classList.add('hidden');
      document.getElementById('stopBtn').classList.add('hidden');
      document.getElementById('recordBtn').classList.remove('hidden');
      document.getElementById('manualBtn').classList.remove('hidden');
      document.getElementById('mapStatus').textContent = "Recording stopped";
      showSaveButton();
    }

    function saveCurrentPath() {
      if (recordingPoints.length < 3) { alert("Draw or record a bit more first!"); return; }
      const name = prompt("Name this route (manual or live)", "Fort Worth Run - " + new Date().toLocaleDateString());
      if (!name) return;
      let meters = 0;
      for (let i = 1; i < recordingPoints.length; i++) meters += map.distance(recordingPoints[i-1], recordingPoints[i]);
      const miles = (meters * 0.000621371).toFixed(1);
      const route = {id: Date.now(), name, date: new Date().toLocaleDateString(), miles, coords: recordingPoints.map(p => [p.lat, p.lng])};
      savedRoutes.unshift(route);
      localStorage.setItem('savedRoutes', JSON.stringify(savedRoutes));
      renderSavedRoutes();
      alert(`✅ Saved "${name}" — ${miles} miles!`);
      clearLine(); // optional: clear after save
    }

    function clearLine() {
      recordingPoints = [];
      if (recordingPolyline) recordingPolyline.remove();
      document.getElementById('liveDistance').textContent = "0.0 mi";
      document.getElementById('saveBtn').classList.add('hidden');
      document.getElementById('mapStatus').textContent = "Line cleared — start new path or recording";
    }

    function centerOnMe() {
      if (locationMarker && map) map.flyTo(locationMarker.getLatLng(), map.getZoom());
    }

    function redrawRecordingLine() {
      if (recordingPolyline) recordingPolyline.remove();
      if (recordingPoints.length > 0) recordingPolyline = L.polyline(recordingPoints, {color:'#22c55e', weight:7}).addTo(map);
    }

    function updateLiveDistance() {
      let meters = 0;
      for (let i = 1; i < recordingPoints.length; i++) meters += map.distance(recordingPoints[i-1], recordingPoints[i]);
      document.getElementById('liveDistance').textContent = (meters * 0.000621371).toFixed(2) + " mi";
    }

    function showSaveButton() {
      if (recordingPoints.length > 2) document.getElementById('saveBtn').classList.remove('hidden');
    }

    function toggleFollow() {
      followMe = document.getElementById('followToggle').checked;
    }

    function renderSavedRoutes() {
      const container = document.getElementById("savedRoutesList");
      container.innerHTML = savedRoutes.length ? "" : '<p class="text-gray-500 italic">No routes saved yet. Draw or record one above!</p>';
      savedRoutes.forEach((route, index) => {
        const div = document.createElement("div");
        div.className = "bg-gray-800 rounded-2xl p-5 flex justify-between items-center";
        div.innerHTML = `<div><div class="font-semibold">\( {route.name}</div><div class="text-sm text-gray-400"> \){route.date} • \( {route.miles} mi</div></div><div class="flex gap-2"><button onclick="loadSavedRoute( \){index});event.stopImmediatePropagation()" class="px-5 py-2 bg-green-600 rounded-xl text-sm font-medium">Load on Map</button><button onclick="deleteRoute(${index});event.stopImmediatePropagation()" class="px-4 py-2 text-red-400">🗑️</button></div>`;
        container.appendChild(div);
      });
    }

    function loadSavedRoute(index) {
      const route = savedRoutes[index];
      recordingPoints = route.coords.map(c => L.latLng(c[0], c[1]));
      redrawRecordingLine();
      updateLiveDistance();
      showSaveButton();
      if (map) map.fitBounds(recordingPoints);
    }

    function deleteRoute(index) {
      if (confirm("Delete this route?")) {
        savedRoutes.splice(index, 1);
        localStorage.setItem('savedRoutes', JSON.stringify(savedRoutes));
        renderSavedRoutes();
      }
    }

    function toggleDark() {
      document.documentElement.classList.toggle("dark");
      const icon = document.getElementById("theme-icon");
      icon.classList.toggle("fa-moon");
      icon.classList.toggle("fa-sun");
    }

    function exportLog() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedRoutes, null, 2));
      const dl = document.createElement("a");
      dl.href = dataStr; dl.download = "my-saved-routes.json"; dl.click();
      alert("✅ All saved routes exported!");
    }

    // INIT
    window.onload = () => {
      initMap();
      renderSavedRoutes();
      document.getElementById('mapStatus').textContent = "Ready — Enable GPS or tap Manual Draw Mode";
    };
  </script>
</body>
</html>
